# Rank Up Dota — desktop app builder (Pake CLI / Tauri)
#
# Belongs in the PUBLIC repo `sphinxcode/rankup-dota-desktop` at
# `.github/workflows/build-desktop-apps.yml`. Builds native apps from the live URL and
# publishes installers to that repo's public Releases; the app's Download modal links to
# `releases/latest/download/RankUpDota-{windows.msi,macos.dmg,linux.deb}`.
#
# NOTE: uses the `pake-cli` npm package directly (not `uses: tw93/Pake@...`, whose repo
# contains a symlink that breaks GitHub's action download).

name: Build Desktop Apps
on:
  workflow_dispatch:
    inputs:
      url:
        description: Live app URL to wrap
        default: https://dota.sphinx.codes
      version:
        description: Release tag (e.g. v0.1.0)
        default: v0.1.0

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            ext: msi
            out: RankUpDota-windows.msi
          - os: macos-latest
            ext: dmg
            out: RankUpDota-macos.dmg
          - os: ubuntu-24.04
            ext: deb
            out: RankUpDota-linux.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - name: Linux build dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup mold linker (Linux)
        if: runner.os == 'Linux'
        uses: rui314/setup-mold@v1

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Build native app (Linux/macOS)
        if: runner.os != 'Windows'
        timeout-minutes: 30
        run: pake "${{ inputs.url }}" --name RankUpDota --width 1400 --height 900

      - name: Build native app (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 30
        shell: pwsh
        run: pake "${{ inputs.url }}" --name RankUpDota --width 1400 --height 900

      - name: Rename to a stable asset name
        shell: bash
        run: |
          f=$(ls *.${{ matrix.ext }} 2>/dev/null | head -1)
          if [ -z "$f" ]; then echo "no .${{ matrix.ext }} produced:"; ls -la; exit 1; fi
          echo "Packaging $f -> ${{ matrix.out }}"
          cp "$f" "${{ matrix.out }}"

      - name: Publish to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Rank Up Dota ${{ inputs.version }}
          files: ${{ matrix.out }}
          fail_on_unmatched_files: true
